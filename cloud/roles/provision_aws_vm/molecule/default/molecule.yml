---
# Localhost scenario: the role runs in <domain>_check_mode so its own logic is
# tested in CI with no live infrastructure. Runs in the matching CI job on every
# PR touching this domain. Captured facts persist converge->verify via jsonfile cache.
role_name_check: 1
driver:
  name: default
platforms:
  - name: localhost
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../"
  config_options:
    defaults:
      fact_caching: jsonfile
      fact_caching_connection: /tmp/molecule_aws_factcache
      fact_caching_prefix: molecule_
  inventory:
    host_vars:
      localhost:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - syntax
    - converge
    - idempotence
    - verify
    - destroy
