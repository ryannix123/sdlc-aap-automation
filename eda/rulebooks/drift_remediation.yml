---
- name: Remediate configuration drift
  sources:
    - ansible.eda.webhook:
        host: 0.0.0.0
        port: 5000
  rules:
    - name: DNS record deleted out-of-band
      condition: event.payload.alert == "dns_record_missing"
      action:
        run_job_template:
          name: "Manage DNS Record"
          organization: "Network"
          job_args:
            extra_vars:
              record_fqdn: "{{ event.payload.fqdn }}"
              record_ip: "{{ event.payload.ip }}"
