---
# Molecule scenario for manage_dns_record.
# Uses the 'default' driver (no container/cloud needed): the role runs against
# localhost in dns_check_mode, so the role's own logic is fully tested in CI
# while the live Infoblox grid call is simulated. This is what runs in the
# network job of .github/workflows/ci.yml on every PR touching network/.
role_name_check: 1
driver:
  name: default
platforms:
  - name: localhost
provisioner:
  name: ansible
  env:
    ANSIBLE_ROLES_PATH: "../../../"
  config_options:
    defaults:
      callbacks_enabled: ansible.builtin.default
      fact_caching: jsonfile
      fact_caching_connection: /tmp/molecule_dns_factcache
      fact_caching_prefix: molecule_
  inventory:
    host_vars:
      localhost:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"
verifier:
  name: ansible
scenario:
  test_sequence:
    - dependency
    - syntax
    - converge
    - idempotence
    - verify
    - destroy
