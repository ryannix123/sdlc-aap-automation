---
- name: Verify — assert provision_ontap_volume results
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Write-back facts are correct
      ansible.builtin.assert:
        that:
          - ansible_facts['vol_name'] == "snow_REQ0024680"
          - ansible_facts['vol_path'] == "/snow_REQ0024680"
        success_msg: "Storage path verified: volume name and junction path set correctly."
